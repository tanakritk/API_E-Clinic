name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/api-e-clinic
            git pull origin main
            docker build -t api-e-clinic:latest .
            docker stop api-e-clinic || true
            docker rm api-e-clinic || true
            docker run -d \
              --name api-e-clinic \
              --restart always \
              -p 9001:9001 \
              --env-file /opt/api-e-clinic/.env \
              api-e-clinic:latest