name: Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/api-e-clinic

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE,APP_JWT_SIGNATURE,APP_PASSWORD_KEY,APP_DEFAULT_PASSWORD,DB_HOST,DB_PORT,DB_USERNAME,DB_PASSWORD,DB_NAME
          script: |
            echo $GHCR_TOKEN | docker login ghcr.io -u $GHCR_USER --password-stdin
            docker pull $IMAGE:latest
            docker stop api-e-clinic || true
            docker rm api-e-clinic || true
            docker run -d \
              --name api-e-clinic \
              --restart always \
              -p 9001:9001 \
              -e APP_PORT=9001 \
              -e APP_JWT_SIGNATURE="$APP_JWT_SIGNATURE" \
              -e APP_PASSWORD_KEY="$APP_PASSWORD_KEY" \
              -e APP_DEFAULT_PASSWORD="$APP_DEFAULT_PASSWORD" \
              -e DB_HOST="$DB_HOST" \
              -e DB_PORT="$DB_PORT" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e DB_NAME="$DB_NAME" \
              $IMAGE:latest
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/api-e-clinic
          APP_JWT_SIGNATURE: ${{ secrets.APP_JWT_SIGNATURE }}
          APP_PASSWORD_KEY: ${{ secrets.APP_PASSWORD_KEY }}
          APP_DEFAULT_PASSWORD: ${{ secrets.APP_DEFAULT_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
